name: Deploy Docs

on:
  push:
    branches: [main, development]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy (e.g. after development branch update)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (stable)
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable
          fetch-depth: 1

      - name: Checkout development (dev)
        uses: actions/checkout@v4
        with:
          ref: development
          path: dev
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stable/docs/package-lock.json

      - name: Install & build stable docs
        working-directory: stable/docs
        env:
          NEXT_PUBLIC_DOCS_CHANNEL: stable
        run: |
          npm ci
          npm run build

      - name: Install & build dev docs (basePath=/dev)
        working-directory: dev/docs
        env:
          NEXT_PUBLIC_BASE_PATH: /dev
          NEXT_PUBLIC_DOCS_CHANNEL: dev
        run: |
          npm ci
          npm run build

      - name: Merge outputs (stable at root, dev at /dev)
        run: |
          mkdir -p site
          cp -r stable/docs/out/. site/
          mkdir -p site/dev
          cp -r dev/docs/out/. site/dev/
          touch site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
