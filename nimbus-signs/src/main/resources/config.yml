# Nimbus Signs — Server selector signs for your lobby
# Signs auto-update with live data from the Nimbus cloud.
# Sign lines are configured in display configs (config/modules/display/<group>.toml).

# How often to refresh signs (in ticks, 20 = 1 second)
update-interval: 40

signs:
  # Example: BedWars group sign (routes to best available server)
  # bedwars:
  #   target: BedWars
  #   strategy: least         # least / fill / random
  #   location:
  #     world: world
  #     x: 100
  #     y: 65
  #     z: 200

  # Example: Specific service sign (always connects to Survival-1)
  # survival:
  #   target: Survival-1
  #   location:
  #     world: world
  #     x: 104
  #     y: 65
  #     z: 200
